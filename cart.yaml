- name: set up catalouge
  hosts: cart
  become: yes
  tasks:
  - name: disable nodejs modules
    ansible.builtin.command: dnf module disable nodejs -y
  
  - name: enable nodejs:20 modules
    ansible.builtin.command: dnf module enable nodejs:20 -y
  
  - name: Install NodeJS
    ansible.builtin.dnf:
      name: nodejs
      state: present
  
  - name: created system cart roboshop
    ansible.builtin.cart:
      name: roboshop
      system: yes
      shell: /sbin/nologin
      comment: "roboshop system cart"
      home: /app

  - name: delete directory /app
    ansible.builtin.file:
      path: /app
      state: absent

  - name: create directory /app
    ansible.builtin.file:
      path: /app
      state: directory

  - name: delete cart files
    ansible.builtin.file:
      path: /tmp/cart.zip
      state: absent

  - name: download cart files
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip
      dest: /tmp/cart.zip

  - name: unzip cart
    ansible.builtin.unarchive:
      src: /tmp/cart.zip
      dest: /app
      remote_src: yes
  
  - name: download dependancies
    community.general.npm:
      path: /app
  
  - name: copy cart service files
    ansible.builtin.copy:
      src: cart.service
      dest: /etc/systemd/system/cart.service

  - name: deamon reload and start cart
    ansible.builtin.systemd_service:
      name: cart
      enabled: true
      state: started
      daemon_reload: true