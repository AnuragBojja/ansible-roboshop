- name: setup shipping
  hosts: shipping
  become: yes
  tasks:
  - name: install maven 
    ansible.builtin.dnf:
      name: "{{item}}"
      state: present
    loop:
    - maven
    - mysql
  
  - name: install required python libraries
    ansible.builtin.pip:
      executable: pip3.9
      name: "{{item}}"
    loop:
    - PyMySQL
    - cryptography
    
  - name: created system cart roboshop
    ansible.builtin.user:
      name: roboshop
      system: yes
      shell: /sbin/nologin
      comment: "roboshop system cart"
      home: /app

  - name: delete directory /app
    ansible.builtin.file:
      path: /app
      state: absent

  - name: create directory /app
    ansible.builtin.file:
      path: /app
      state: directory

  - name: delete shipping files
    ansible.builtin.file:
      path: /tmp/shipping.zip
      state: absent

  - name: download cart files
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip
      dest: /tmp/shipping.zip

  - name: unzip shipping
    ansible.builtin.unarchive:
      src: /tmp/shipping.zip
      dest: /app
      remote_src: yes
  
  - name: installing dependancies
    ansible.builtin.command: mvn clean package
    args:
      chdir: /app 

  - name: copy shipping.jsr
    ansible.builtin.command: mv target/shipping-1.0.jar shipping.jar
    args:
      chdir: /app 

  - name: copy shipping service files
    ansible.builtin.copy:
      src: shipping.service
      dest: /etc/systemd/system/shipping.service

  - name: load data into mysql
    community.mysql.mysql_db:
      state: import
      name: all
      target: "{{item}}"
      login_host: mysql.anuragaws.shop
      login_password: RoboShop@1
      login_user: root 
    loop:
    - /app/db/schema.sql
    - /app/db/app-user.sql
    - /app/db/master-data.sql

  - name: deamon reload and start shipping
    ansible.builtin.systemd_service:
      name: shipping
      enabled: true
      state: started
      daemon_reload: true
