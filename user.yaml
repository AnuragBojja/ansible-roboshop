- name: set up catalouge
  hosts: user
  become: yes
  tasks:
  - name: disable nodejs modules
    ansible.builtin.command: dnf module disable nodejs -y
  
  - name: enable nodejs:20 modules
    ansible.builtin.command: dnf module enable nodejs:20 -y
  
  - name: Install NodeJS
    ansible.builtin.dnf:
      name: nodejs
      state: present
  
  - name: created system user roboshop
    ansible.builtin.user:
      name: roboshop
      system: yes
      shell: /sbin/nologin
      comment: "roboshop system user"
      home: /app

  - name: delete directory /app
    ansible.builtin.file:
      path: /app
      state: absent

  - name: create directory /app
    ansible.builtin.file:
      path: /app
      state: directory

  - name: delete user files
    ansible.builtin.file:
      path: /tmp/user.zip
      state: absent

  - name: download user files
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip
      dest: /tmp/user.zip

  - name: unzip user
    ansible.builtin.unarchive:
      src: /tmp/user.zip
      dest: /app
      remote_src: yes
  
  - name: download dependancies
    community.general.npm:
      path: /app
  
  - name: copy user service files
    ansible.builtin.copy:
      src: user.service
      dest: /etc/systemd/system/user.service

  - name: deamon reload and start user
    ansible.builtin.systemd_service:
      name: user
      enabled: true
      state: started
      daemon_reload: true